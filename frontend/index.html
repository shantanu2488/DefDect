<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DefDect - PDF Objection Checker</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>DefDect</h1>
      <p class="sub">Upload one PDF and check likely Delhi HC filing objections.</p>

      <section class="card">
        <div class="meta-grid">
          <input id="diaryNo" type="text" placeholder="Diary No (e.g. 143753/2026)" />
          <input id="caseTitle" type="text" placeholder="Case Title" />
        </div>
        <input id="pdfInput" type="file" accept="application/pdf" />
        <button id="checkBtn">Check Defects</button>

        <div id="progressWrap" class="progress-wrap hidden">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="status"></p>
      </section>

      <section id="result" class="card hidden"></section>
      <section id="exportCard" class="card hidden">
        <button id="pdfExportBtn">Export PDF</button>
        <button id="docxExportBtn">Export Word</button>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
