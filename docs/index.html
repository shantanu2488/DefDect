<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DefDect</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
    <!-- PDF.js legacy build fallback (works on more browsers than module builds) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="hero card">
        <p class="eyebrow">Delhi HC Filing Assistant</p>
        <h1>DefDect</h1>
        <p class="sub">Upload PDF and get an instant objection pre-screening report in your browser.</p>
      </header>

      <section class="card">
        <label for="pdfInput" class="file-label">Select filing PDF</label>
        <input id="pdfInput" type="file" accept="application/pdf" />
        <button id="checkBtn">Check Defects</button>

        <div id="progressWrap" class="progress-wrap hidden">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="status"></p>
      </section>

      <section id="result" class="card hidden"></section>

      <section id="pdfActions" class="card hidden">
        <button id="downloadPdfBtn" type="button">Download PDF</button>
      </section>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
</html>
